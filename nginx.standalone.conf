user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        root /var/www/html/public;
        index index.php;

        charset utf-8;
        charset_types text/html text/css application/javascript text/javascript application/json;

        error_page 404 /404.php;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        client_max_body_size 500M;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_intercept_errors on;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 600;
            fastcgi_send_timeout 600;
        }

        # Backend folders live ABOVE the document root (public/) and are
        # unreachable over HTTP, so no per-folder deny-list is needed.

        location ~ /\.(?!well-known).* {
            deny all;
            access_log off;
            log_not_found off;
        }

        location = /favicon.ico { log_not_found off; access_log off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
    }
}
