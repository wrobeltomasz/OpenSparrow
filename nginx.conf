server {
    listen 80;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    charset_types text/html text/css application/javascript text/javascript application/json;

    # Custom 404 error page mapping
    error_page 404 /404.php;

    # Main location handling
    # Tries to serve the requested URI as a file, then a directory, 
    # and finally falls back to index.php with the query string.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Allow large CSV imports (up to 500 MB)
    client_max_body_size 500M;

    # PHP-FPM processing
    location ~ \.php$ {
        # Connects to the 'app' service defined in docker-compose.yml on port 9000
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        # Passes the correct script path to PHP-FPM
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Intercept errors from PHP-FPM and display custom error pages defined above
        fastcgi_intercept_errors on;

        # Security: Hide PHP version for better protection
        fastcgi_hide_header X-Powered-By;

        # Timeouts for large file uploads and long-running imports
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
    }

    # Backend folders (includes, src, config, templates, storage, vendor, languages,
    # cron, docs, tests, tmp) now live ABOVE the document root (public/), so they
    # cannot be reached over HTTP. No per-folder deny-list needs to be maintained here.

    # Block access to hidden files (dotfiles)
    # This covers .git, .env, .dockerignore, etc.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Optimize performance for common assets
    # Disables logging for favicon and robots.txt to reduce noise in logs
    location = /favicon.ico { 
        log_not_found off; 
        access_log off; 
    }
    
    location = /robots.txt  { 
        access_log off; 
        log_not_found off; 
    }

    # General security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}